name: Integration

on:
  push:
    branches: [ "main" ]
    paths:
      - 'include/**'
      - 'ci/integration/**'
      - '.github/workflows/integration.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'include/**'
      - 'ci/integration/**'
      - '.github/workflows/integration.yml'

jobs:
  Build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        include:
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: cmake -B ${{ github.workspace }}/ci/integration/cmake-build
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=Release
          -DFETCHCONTENT_SOURCE_DIR_AESIMULTIPRECISION=${{ github.workspace }}
          -S ${{ github.workspace }}/ci/integration

      - name: Build
        run: cmake --build ${{ github.workspace }}/ci/integration/cmake-build --config Release -j8

      - name: Run
        run: ctest --test-dir ${{ github.workspace }}/ci/integration/cmake-build -C Release --output-on-failure
