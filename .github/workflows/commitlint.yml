name: Commitlint

on:
  pull_request:
    branches: [ "main" ]
    types: [ opened, edited, synchronize, reopened ]

jobs:
  commitlint:
    runs-on: ubuntu-latest

    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            test
            chore
            ci
            build
            perf
            revert