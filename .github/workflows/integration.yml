name: Build as library

on:
  push:
    branches: [ "main" ]
  pull_request:
      branches: [ "main" ]

jobs:
  Integration-as-library:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        os: [ ubuntu-latest ]
        build_type: [ Release ]
        c_compiler: [ gcc, clang, cl ]
        include:
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: ubuntu-latest
            c_compiler: cl

    steps:
      - uses: actions/checkout@v4
      - uses: Jimver/cuda-toolkit@v0.2.22
        id: cuda-toolkit
        with:
          cuda: '12.8.0'
        #    run: echo "Installed cuda version is: ${{steps.cuda-toolkit.outputs.cuda}}"
        #    run: echo "Cuda install location: ${{steps.cuda-toolkit.outputs.CUDA_PATH}}"
        #    run: nvcc -V

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "ci=${{ github.workspace }}/ci/integration" >> "$GITHUB_OUTPUT"
          echo "build=${{ github.workspace }}/ci/integration/cmake-build" >> "$GITHUB_OUTPUT"

      - name: Create directory
        run: mkdir ${{ steps.strings.outputs.build }}

      - name: Load CMake configuration
        working-directory: ${{ steps.strings.outputs.build }}
        run: cmake -B ${{ steps.strings.outputs.build }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -S ${{ steps.strings.outputs.ci }}

      - name: Test
        working-directory: ${{ steps.strings.outputs.build }}
        run: | 
          cmake --build ${{ steps.strings.outputs.build }} --target Library_Integration -j 8
          ./Library_Integration
      - name: Test Cuda
        working-directory: ${{ steps.strings.outputs.build }}
        run: |
          cmake --build ${{ steps.strings.outputs.build }} --target Library_Integration_CUDA -j 8
          ./Library_Integration_CUDA

  Prezentation:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        os: [ ubuntu-latest ]
        build_type: [ Release ]
        c_compiler: [ gcc, clang, cl ]
        include:
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: ubuntu-latest
            c_compiler: cl

    steps:
      - uses: actions/checkout@v4

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "ci=${{ github.workspace }}/ci/integration" >> "$GITHUB_OUTPUT"
          echo "build=${{ github.workspace }}/ci/integration/cmake-build" >> "$GITHUB_OUTPUT"

      - name: Create directory
        run: mkdir ${{ steps.strings.outputs.build }}

      - name: Load CMake configuration
        working-directory: ${{ steps.strings.outputs.build }}
        run: cmake -B ${{ steps.strings.outputs.build }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -S ${{ steps.strings.outputs.ci }}

      - name: Test
        working-directory: ${{ steps.strings.outputs.build }}
        run: |
          cmake --build ${{ steps.strings.outputs.build }} --target Readme_Examples -j 8
          ./Readme_Examples


